<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UV Static v2</title>

    <script defer src="scripts/lstimer.js"></script>

    <link rel="stylesheet" href="style/global.css" />
    <link rel="stylesheet" href="style/browser.css" />
    

    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/gh/vanjs-org/van/public/van-1.5.2.nomodule.min.js"
    ></script>

    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>

    <script src="uv/uv.bundle.js" defer></script>
    <script src="uv/uv.config.js" defer></script>
    <script src="scripts/tabs.mjs" type="module" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@100..900&family=Inter:wght@100..900&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/gh/tf7software/Font-Awesome-pro-cdn@main/js/all.js"></script>
    <style>
      body {padding: 0;margin: 0;}
    </style>
    <script>
      window.onload = function () {
        if (!localStorage.getItem("discordAlertShown")) {
          alert("Join our discord.gg/XygZfmMM86 for bonuses, updates, links, and more!");
          localStorage.setItem("discordAlertShown", "true");
        }
      };
    </script>
  </head>

  <body>
    <div id="small-screen-overlay">
      UV Static 2.0 doesn't support smaller screens. Please use UV Static 2.0 on a larger screen.
    </div>


  <div id="nav"></div>
  <div id="main-content"></div>


    <div id="tab-view" class=""></div>
    <div class="sidebar-container">
      <header>
        <div class="page-data">
          <span id="controls">
            <button id="logo-button">
              <?xml version="1.0" encoding="UTF-8" standalone="no"?>
              <svg
   width="60mm"
   height="25mm"
   viewBox="0 0 60 25"
   version="1.1"
   id="svg1"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <defs
     id="defs1" />
  <g
     id="layer1">
    <text
       xml:space="preserve"
       style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:24px;font-family:Orbitron;-inkscape-font-specification:Orbitron;text-align:start;writing-mode:lr-tb;direction:ltr;text-anchor:start;fill:#5a32e3;fill-opacity:1;stroke-width:2.74734"
       x="5"
       y="20"
       id="text2"><tspan
         id="tspan1"
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-family:Orbitron;-inkscape-font-specification:Orbitron;fill:#5a32e3;fill-opacity:1;stroke-width:2.74734"
         x="5"
         y="20">v2</tspan></text>
  </g>
</svg>

           

              <p class="tooltip">Home</p>
            </button>
            <!-- <p class="logo-name">RED Browse</p> -->
            <span>
              <button id="page-back">
                <ion-icon
                  name="arrow-back-outline"
                  class="icon hover-focus1"
                ></ion-icon>
                <p class="tooltip">Back</p>
              </button>
              <button id="page-forward">
                <ion-icon
                  name="arrow-forward-outline"
                  class="icon hover-focus1"
                ></ion-icon>
                <p class="tooltip">Forward</p>
              </button>
              <button id="page-refresh">
                <ion-icon
                  name="refresh-outline"
                  class="icon hover-focus1"
                ></ion-icon>
                <p class="tooltip">Refresh</p>
              </button>
              <button id="options-btn">
                <ion-icon
                  name="menu-outline"
                  class="icon hover-focus1"
                ></ion-icon>
                <p class="tooltip">Menu</p>
              </button>
            </span>
          </span>
          <form id="url-form">
            <input
              type="text"
              id="url-input"
              onfocus="this.setSelectionRange(0, this.value.length)"
              class="hover-focus2"
              placeholder="Search or enter URL"
              autocomplete="off"
              autocorrect="off"
              spellcheck="false"
            />
          </form>
          <button id="new-tab" class="hover-focus2">
            <ion-icon name="add-outline" class="icon"></ion-icon>
            <span>New Tab</span>
          </button>
        </div>
        <div id="tab-list"></div>
      </header>
    </div>

    <div id="menu-overlay">
      <div class="option" id="devtools-option">Developer Tools</div>
      <div class="option" id="abc-option">Open in about:blank</div>
      <div class="option" id="git-option">GitHub</div>
      
      <div class="menu-section">
        <p class="section-title">Wisp Server</p>
        <div class="wisp-custom">
          <input type="text" id="wisp-input" placeholder="Custom Wisp URL..." spellcheck="false" />
          <button id="wisp-save">Save</button>
        </div>
        <div id="wisp-list">
          <!-- Wisp servers will be injected here -->
        </div>
      </div>

      <div class="menu-info">
        <p>Name: Dhruva V.</p>
        <p>GitHub: octotoxin</p>
        <p>Email: dhruva.neurotoxin@gmail.com</p>
        <p>Alt Email: 207318@forsythk12.org</p>
      </div>
    </div>
    <script>
      const optionsBtn = document.getElementById("options-btn");
      const overlay = document.getElementById("menu-overlay");
      optionsBtn.addEventListener("click", () => {
        overlay.classList.toggle("active");
      });

      let logoClicks = 0;
      let logoTimeout;
      const logoBtn = document.getElementById("logo-button");
      logoBtn.addEventListener("click", (e) => {
        e.preventDefault();
        logoClicks++;
        clearTimeout(logoTimeout);
        logoTimeout = setTimeout(() => {
          if (logoClicks < 20) {
            window.location.href = './';
          }
          logoClicks = 0;
        }, 500);

        if (logoClicks >= 20) {
          const info = document.querySelector('.menu-info');
          if (info) {
            info.style.display = 'block';
            if (typeof rAlert === 'function') {
                import('./scripts/utils.mjs').then(m => m.rAlert("Developer info unlocked!"));
            }
          }
        }
      });
    </script>
  </body>
</html>
